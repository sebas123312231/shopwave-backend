# Perfil de produccion - H2 en memoria
# Activa con: SPRING_PROFILES_ACTIVE=prod
# Render tiene filesystem efimero, por eso se usa H2 in-memory.
# Cada redeploy resetea los datos, pero el DataSeeder los vuelve a crear al arrancar.

spring.datasource.url=jdbc:h2:mem:shopwavefusion;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=false
